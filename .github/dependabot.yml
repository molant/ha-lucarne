version: 2
updates:
  # Frontend (Lit cards) — package.json / package-lock.json
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # Python integration — pyproject.toml (runtime + [dev])
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        patterns:
          - "*"

  # CI workflows under .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
