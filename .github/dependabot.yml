version: 2
updates:
  # Frontend (Lit cards) — package.json / package-lock.json
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        patterns:
          - "*"
    # cropperjs 2.x is a class -> web-component rewrite; the avatar-crop UI in
    # avatar-upload-modal.ts uses the v1 API (new Cropper(...), getCroppedCanvas)
    # and migrating it needs its own spec (see CLAUDE.md). Keep cropperjs on the
    # v1 line until then; major bumps break the typecheck (see PR #46).
    ignore:
      - dependency-name: "cropperjs"
        update-types: ["version-update:semver-major"]

  # Python integration — pyproject.toml (runtime + [dev])
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        patterns:
          - "*"
    # pytest and pytest-asyncio are exact-pinned by
    # pytest-homeassistant-custom-component (it mirrors HA core's test stack),
    # so they update transitively whenever phccc is bumped. Bumping either
    # directly raises the pyproject floor above phccc's pin and makes pip
    # resolution impossible (see PR #45).
    ignore:
      - dependency-name: "pytest"
      - dependency-name: "pytest-asyncio"

  # CI workflows under .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
