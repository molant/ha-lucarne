name: Build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Single source of truth: project.requires-python in pyproject.toml.
          # Resolves to the latest patch of the latest minor satisfying the
          # constraint; when bumping the floor, edit pyproject.toml only.
          python-version-file: pyproject.toml

      - run: pip install -e ".[dev]"

      - run: ruff check custom_components tests/python conftest.py

      - run: mypy custom_components/lucarne_family

      - run: pytest
