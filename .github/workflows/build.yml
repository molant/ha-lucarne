name: Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test:coverage

      - run: npm run build

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          # Single source of truth: project.requires-python in pyproject.toml.
          # Resolves to the latest patch of the latest minor satisfying the
          # constraint; when bumping the floor, edit pyproject.toml only.
          python-version-file: pyproject.toml

      - run: pip install -e ".[dev]"

      - run: ruff check custom_components tests/python conftest.py

      - run: mypy custom_components/lucarne_family

      - run: pytest
