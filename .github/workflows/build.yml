name: Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          # Single source of truth: project.requires-python in pyproject.toml.
          # Resolves to the latest patch of the latest minor satisfying the
          # constraint; when bumping the floor, edit pyproject.toml only.
          python-version-file: pyproject.toml

      - run: pip install -e ".[dev]"

      - run: ruff check custom_components tests/python conftest.py

      - run: mypy custom_components/lucarne_family

      - run: pytest
