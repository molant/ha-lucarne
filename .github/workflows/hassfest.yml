name: Hassfest Validation

on:
  push:
  pull_request:
  schedule:
    # Daily — hassfest rules change with HA core releases; catch drift early.
    - cron: "0 0 * * *"

jobs:
  hassfest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Pin home-assistant/actions to a commit SHA, matching the SHA-pinning
      # convention used by the other workflows. Bump deliberately.
      - uses: home-assistant/actions/hassfest@868e6cb4607727d764341a158d98872cd63fa658 # master as of 2026-05-30
