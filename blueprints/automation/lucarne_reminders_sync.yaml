blueprint:
  name: Lucarne Reminders Sync
  description: |
    Receives a multi-list Apple Reminders payload via webhook and upserts items
    into the corresponding HA todo (local_todo) entities.

    Deduplication strategy: sentinel-prefix in the HA item's description field.
    Each item added by this blueprint stores "[apple:<apple-reminder-id>]" as a
    prefix in its description. On each sync cycle, existing items are matched by
    this prefix. This avoids duplicates even if the Apple Reminder title changes.

    If todo.get_items does not return description for local_todo entities on your
    HA version, fall back to title-based matching (items matched by summary).
    The current implementation uses the sentinel path.

    Known v1 limitations:
    - Removing a due date in Apple Reminders may not clear the HA item's due date
      (HA's todo.update_item silently ignores null due_datetime; see the no-due
      branch in the action body). Add a clear step manually in HA if needed.
    - If two Apple Reminders in the same list share the exact same title, the
      todo.update_item call (which identifies items by summary) may target the
      wrong row. Keep reminder titles unique within each synced list.

    Payload schema:
      {
        "lists": [
          {
            "apple_list_name": "Family",
            "filter_applied": "assigned_to_ingrid",
            "items": [
              { "id": "apple-stable-uuid", "title": "...", "due": "2026-05-22T17:00:00Z", "completed": false }
            ]
          }
        ]
      }
  domain: automation
  input:
    webhook_id:
      name: Webhook ID
      description: >
        The HA webhook ID (= the shared secret). Generate with:
        openssl rand -hex 32
        Store in macOS Keychain on the Mac mini; never commit this value.
      selector:
        text:
          type: password
    list_mappings:
      name: List Mappings
      description: |
        JSON mapping from incoming Apple list names to HA todo entity IDs.
        Example: {"Family": "todo.ingrid_tasks", "Groceries": "todo.groceries"}
        Use exact entity IDs from your HA instance (Settings → Devices & Services → Entities).
      selector:
        text:
          multiline: true
    local_only:
      name: Local only (reject non-LAN sources)
      description: |
        When enabled (default), the webhook rejects requests from non-RFC1918 source IPs.
        Disable if the Mac mini reaches HA via Tailscale (100.x.y.z addresses) — the
        shared webhook secret provides authentication in that case.
      default: true
      selector:
        boolean:

variables:
  # Blueprint inputs must be projected into raw vars before use in Jinja templates.
  # Bare `list_mappings` would be undefined in template context without this projection.
  list_mappings_raw: !input list_mappings
  mappings: "{{ list_mappings_raw | from_json }}"

trigger:
  - platform: webhook
    webhook_id: !input webhook_id
    allowed_methods:
      - POST
    local_only: !input local_only

mode: single
max_exceeded: silent

action:
  - repeat:
      for_each: "{{ trigger.json.lists | default([]) }}"
      sequence:
        - variables:
            list_apple_name: "{{ repeat.item.apple_list_name | default('') }}"
            list_target_entity: "{{ mappings.get(repeat.item.apple_list_name | default(''), '') }}"
            list_incoming: "{{ repeat.item.items | default([]) }}"
            list_incoming_active_ids: >-
              {{ list_incoming
                 | selectattr('completed', 'equalto', false)
                 | map(attribute='id') | list }}

        - choose:
            - conditions:
                - "{{ list_target_entity == '' }}"
              sequence:
                - action: system_log.write
                  data:
                    message: >-
                      Lucarne sync: no HA entity mapped for Apple list
                      '{{ list_apple_name }}'. Check list_mappings input.
                    level: warning
          default:
            # Fetch all existing items (active + completed) for this entity
            - action: todo.get_items
              target:
                entity_id: "{{ list_target_entity }}"
              data:
                status:
                  - needs_action
                  - completed
              response_variable: ha_response

            - variables:
                list_existing_items: "{{ ha_response[list_target_entity].items | default([]) }}"
                # Build map: apple_id -> {summary, status} for items with our sentinel prefix.
                # Requires local_todo to return the description field in get_items.
                list_existing_by_id: >-
                  {% set ns = namespace(result={}) %}
                  {% for item in ha_response[list_target_entity].items | default([]) %}
                    {% set desc = item.get('description', '') or '' %}
                    {% if '[apple:' in desc %}
                      {% set apple_id = desc | regex_findall('\[apple:([^\]]+)\]') | first | default('') %}
                      {% if apple_id %}
                        {% set ns.result = dict(ns.result, **{
                            apple_id: {'summary': item.summary, 'status': item.status}
                          }) %}
                      {% endif %}
                    {% endif %}
                  {% endfor %}
                  {{ ns.result }}

            # --- Upsert each incoming active item ---
            - repeat:
                for_each: >-
                  {{ list_incoming
                     | selectattr('completed', 'equalto', false) | list }}
                sequence:
                  - variables:
                      inc_id: "{{ repeat.item.id }}"
                      inc_title: "{{ repeat.item.title }}"
                      inc_due: "{{ repeat.item.due | default(None) }}"
                      inc_notes: "{{ repeat.item.notes | default('') }}"
                      inc_sentinel_desc: >-
                        {{ '[apple:' ~ repeat.item.id ~ ']'
                           ~ (' ' ~ repeat.item.notes if repeat.item.notes | default('') else '') }}
                      inc_ha_match: "{{ list_existing_by_id.get(repeat.item.id) }}"

                  - choose:
                      # Existing item found — always update to pick up title, due, notes, or status changes
                      - conditions:
                          - "{{ inc_ha_match is not none and inc_ha_match is mapping }}"
                        sequence:
                          - choose:
                              # Has due date
                              - conditions:
                                  - "{{ inc_due is not none and inc_due != '' }}"
                                sequence:
                                  - action: todo.update_item
                                    target:
                                      entity_id: "{{ list_target_entity }}"
                                    data:
                                      item: "{{ inc_ha_match.summary }}"
                                      rename: "{{ inc_title }}"
                                      description: "{{ inc_sentinel_desc }}"
                                      status: needs_action
                                      due_datetime: "{{ inc_due }}"
                            default:
                              - action: todo.update_item
                                target:
                                  entity_id: "{{ list_target_entity }}"
                                data:
                                  item: "{{ inc_ha_match.summary }}"
                                  rename: "{{ inc_title }}"
                                  description: "{{ inc_sentinel_desc }}"
                                  status: needs_action
                    # New item — add it
                    default:
                      - choose:
                          # Has due date
                          - conditions:
                              - "{{ inc_due is not none and inc_due != '' }}"
                            sequence:
                              - action: todo.add_item
                                target:
                                  entity_id: "{{ list_target_entity }}"
                                data:
                                  item: "{{ inc_title }}"
                                  description: "{{ inc_sentinel_desc }}"
                                  due_datetime: "{{ inc_due }}"
                        default:
                          - action: todo.add_item
                            target:
                              entity_id: "{{ list_target_entity }}"
                            data:
                              item: "{{ inc_title }}"
                              description: "{{ inc_sentinel_desc }}"

            # --- Mark HA items completed if gone from Apple's active set ---
            - repeat:
                for_each: >-
                  {{ list_existing_items
                     | selectattr('status', 'equalto', 'needs_action') | list }}
                sequence:
                  - variables:
                      ext_summary: "{{ repeat.item.summary }}"
                      ext_desc: "{{ repeat.item.get('description', '') or '' }}"
                      ext_apple_id: >-
                        {{ ext_desc
                           | regex_findall('\[apple:([^\]]+)\]')
                           | first | default('') }}

                  - choose:
                      # Only process items with our sentinel; mark complete if not in incoming active list
                      - conditions:
                          - "{{ ext_apple_id != '' and ext_apple_id not in list_incoming_active_ids }}"
                        sequence:
                          - action: todo.update_item
                            target:
                              entity_id: "{{ list_target_entity }}"
                            data:
                              item: "{{ ext_summary }}"
                              status: completed
