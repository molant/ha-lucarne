blueprint:
  name: Lucarne Chores Daily Reset
  description: |
    At the configured reset time, flip every listed input_boolean chore entity to off.
    Use this to reset all kids' chores at midnight (or any configured time).
  domain: automation
  input:
    reset_time:
      name: Reset Time
      description: Local time when daily chores reset (e.g. "00:00")
      selector:
        time: {}
    chore_entities:
      name: Chore Entities
      description: |
        Comma-separated list of input_boolean entity IDs to reset.
        Example: input_boolean.kid_1_brush_teeth, input_boolean.kid_1_make_bed
      selector:
        text:
          multiline: true

trigger:
  - platform: time
    at: !input reset_time

variables:
  entities_csv: !input chore_entities
  entity_list: "{{ entities_csv.split(',') | map('trim') | reject('equalto', '') | list }}"

action:
  - service: input_boolean.turn_off
    target:
      entity_id: "{{ entity_list }}"

mode: single
