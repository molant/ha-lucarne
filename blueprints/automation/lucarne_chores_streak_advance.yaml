blueprint:
  name: Lucarne Chores Streak Advance
  description: |
    At the configured check time, inspect each kid's chore completion.
    If all chores are done, increment that kid's streak counter.
    If any chore is undone, reset the streak counter to 0.
    This automation does NOT fire the ha_lucarne_chores_all_done event —
    that event is fired by the card at tap time.
  domain: automation
  input:
    streak_check_time:
      name: Streak Check Time
      description: Local time when streaks are evaluated (default "21:00")
      default: "21:00"
      selector:
        time: {}
    kid_configs:
      name: Kid Configs (JSON)
      description: |
        JSON array of kid objects. Each object must have:
          kid_slug: string (used as identifier, e.g. "kid1")
          kid_name: string (display name, e.g. "Kid 1")
          streak_counter: full entity_id of the counter (e.g. "counter.kid_1_streak")
          chore_entities: array of full input_boolean entity_ids
        Example:
          [
            {
              "kid_slug": "kid1",
              "kid_name": "Kid 1",
              "streak_counter": "counter.kid_1_streak",
              "chore_entities": [
                "input_boolean.kid_1_brush_teeth",
                "input_boolean.kid_1_make_bed",
                "input_boolean.kid_1_put_away_toys",
                "input_boolean.kid_1_school_bag_ready",
                "input_boolean.kid_1_kindness_act"
              ]
            }
          ]
      selector:
        text:
          multiline: true

trigger:
  - platform: time
    at: !input streak_check_time

variables:
  kid_configs: !input kid_configs
  kid_configs_parsed: "{{ kid_configs | from_json }}"

action:
  - repeat:
      for_each: "{{ kid_configs_parsed }}"
      sequence:
        - variables:
            kid: "{{ repeat.item }}"
            all_done: "{{ (kid.chore_entities | count) > 0 and (kid.chore_entities | select('is_state', 'on') | list | count) == (kid.chore_entities | count) }}"
        - choose:
            - conditions: "{{ all_done }}"
              sequence:
                - service: counter.increment
                  target:
                    entity_id: "{{ kid.streak_counter }}"
            - conditions: "{{ not all_done }}"
              sequence:
                - service: counter.set_value
                  target:
                    entity_id: "{{ kid.streak_counter }}"
                  data:
                    value: 0

mode: single
